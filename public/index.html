<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e2e0d8;
    --text: #1a1917;
    --muted: #7a7870;
    --airbnb: #e05a3a;
    --airbnb-bg: #fdf1ee;
    --booking: #1a5fb4;
    --booking-bg: #edf3fc;
    --soon: #b45309;
    --soon-bg: #fef3c7;
    --ok: #166534;
    --ok-bg: #dcfce7;
    --radius: 10px;
  }
  .dark {
    --bg: #111110;
    --surface: #1c1c1a;
    --border: #2e2e2b;
    --text: #f0ede8;
    --muted: #888580;
    --airbnb: #f07455;
    --airbnb-bg: #2a1a14;
    --booking: #5b9bd5;
    --booking-bg: #111e2e;
    --soon: #f59e0b;
    --soon-bg: #1f1500;
    --ok: #4ade80;
    --ok-bg: #052010;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 10;
  }
  .header-left { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  h1 { font-family: 'DM Mono', monospace; font-size: 17px; font-weight: 500; letter-spacing: -0.02em; }
  .sync-info { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); flex-shrink: 0; transition: background 0.3s; }
  .sync-dot.active { background: #f59e0b; animation: pulse 1s ease-in-out infinite; }
  .sync-dot.ok { background: #22c55e; animation: none; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .header-actions { display: flex; align-items: center; gap: 8px; }
  .lang-btn { font-size: 12px; font-family: 'DM Mono', monospace; border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; background: transparent; cursor: pointer; color: var(--muted); transition: all 0.15s; }
  .lang-btn.active { background: var(--text); color: var(--surface); border-color: var(--text); }
  .sync-btn { font-size: 12px; font-family: 'DM Sans', sans-serif; border: 1px solid var(--border); border-radius: 6px; padding: 5px 14px; background: var(--surface); cursor: pointer; color: var(--text); transition: all 0.15s; display: flex; align-items: center; gap: 5px; }
  .sync-btn:hover:not(:disabled) { background: var(--bg); }
  .sync-btn:disabled { opacity: 0.5; cursor: default; }
  .spin { display: inline-block; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .settings-btn { font-size: 16px; color: var(--muted); cursor: pointer; border: none; background: none; padding: 5px 8px; border-radius: 6px; line-height: 1; }
  .settings-btn:hover { background: var(--bg); }

  /* Progress bar — sits just below header */
  .progress-bar { height: 2px; background: var(--border); position: relative; overflow: hidden; opacity: 0; transition: opacity 0.2s; }
  .progress-bar.active { opacity: 1; }
  .progress-bar::after { content: ''; position: absolute; left: -40%; width: 40%; height: 100%; background: #f59e0b; animation: slide 1.2s ease-in-out infinite; }
  @keyframes slide { to { left: 140%; } }

  main { max-width: 760px; margin: 0 auto; padding: 28px 20px; }

  /* Loader — separate from content */
  .loader-wrap { padding: 48px 0; text-align: center; color: var(--muted); font-size: 14px; }
  .loader-wrap.hidden { display: none; }

  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 28px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .stat-n { font-family: 'DM Mono', monospace; font-size: 26px; font-weight: 500; line-height: 1; margin-bottom: 4px; }
  .stat-l { font-size: 12px; color: var(--muted); }

  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; margin-top: 4px; }
  .section-title { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); font-family: 'DM Mono', monospace; }
  .empty { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; text-align: center; color: var(--muted); font-size: 14px; margin-bottom: 28px; }

  .booking-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }
  .booking {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px 18px;
    display: grid; grid-template-columns: auto 1fr auto; gap: 14px; align-items: start;
    animation: fadeIn 0.18s ease;
  }
  .booking:hover { border-color: #c8c5bb; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }

  .platform-tag { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; flex-shrink: 0; margin-top: 1px; }
  .tag-airbnb { background: var(--airbnb-bg); color: var(--airbnb); }
  .tag-booking { background: var(--booking-bg); color: var(--booking); }

  .booking-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .booking-name.unknown { color: var(--muted); font-weight: 400; font-style: italic; }
  .booking-dates { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .booking-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { font-size: 11px; padding: 3px 8px; border-radius: 20px; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Mono', monospace; background: var(--bg); }
  .chip-noscraped { background: var(--soon-bg); border-color: var(--border); color: var(--soon); }

  .booking-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
  .countdown { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
  .cnt-today { background: #fee2e2; color: #b91c1c; }
  .cnt-soon  { background: var(--soon-bg); color: var(--soon); }
  .cnt-ok    { background: var(--ok-bg); color: var(--ok); }
  .cnt-past  { background: var(--bg); color: var(--muted); }
  .booking-link { font-size: 11px; color: var(--booking); text-decoration: none; font-family: 'DM Mono', monospace; }
  .booking-link:hover { text-decoration: underline; }


  /* ── Calendar ────────────────────────────────────────────────────── */
  .cal-toggle-btn {
    font-size: 12px; font-family: 'DM Mono', monospace;
    border: 1px solid var(--border); border-radius: 6px;
    padding: 5px 10px; background: transparent; cursor: pointer;
    color: var(--muted); transition: all 0.15s;
  }
  .cal-toggle-btn.active { background: var(--text); color: var(--surface); border-color: var(--text); }

  .cal-wrap { margin-bottom: 28px; }
  .cal-months { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 580px) { .cal-months { grid-template-columns: 1fr; } }

  .cal-month { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
  .cal-month-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .cal-month-title { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--text); }
  .cal-nav { display: flex; align-items: center; gap: 6px; }
  .cal-nav-btn { font-size: 14px; border: none; background: none; cursor: pointer; color: var(--muted); padding: 2px 6px; border-radius: 4px; line-height: 1; }
  .cal-nav-btn:hover { background: var(--bg); color: var(--text); }
  .cal-jump { display: flex; gap: 4px; }
  .cal-jump select { font-size: 11px; font-family: 'DM Mono', monospace; border: 1px solid var(--border); border-radius: 5px; padding: 2px 4px; background: var(--surface); color: var(--text); cursor: pointer; }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-dow { font-size: 10px; font-weight: 500; text-align: center; color: var(--muted); padding: 3px 0; font-family: 'DM Mono', monospace; text-transform: uppercase; }
  .cal-cell { min-height: 34px; border-radius: 5px; padding: 3px 4px; font-size: 11px; position: relative; cursor: default; }
  .cal-cell.this-month { background: var(--bg); }
  .cal-cell.other-month { opacity: 0.25; }
  .cal-cell.today { outline: 2px solid var(--text); outline-offset: -2px; }
  .cal-cell.today .cal-day-num { font-weight: 500; }
  .cal-cell.booked-airbnb { background: var(--airbnb-bg); }
  .cal-cell.booked-booking { background: var(--booking-bg); }
  .cal-cell.booked-both { background: linear-gradient(135deg, var(--airbnb-bg) 50%, var(--booking-bg) 50%); }
  .cal-day-num { font-size: 11px; color: var(--muted); line-height: 1.2; }
  .cal-cell.booked-airbnb .cal-day-num,
  .cal-cell.booked-booking .cal-day-num,
  .cal-cell.booked-both .cal-day-num { color: var(--text); }
  .cal-event { font-size: 9px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; border-radius: 2px; padding: 0 2px; line-height: 1.5; }
  .cal-event.ab { color: var(--airbnb); }
  .cal-event.bk { color: var(--booking); }
  .cal-legend { display: flex; gap: 14px; margin-top: 10px; font-size: 11px; color: var(--muted); }
  .cal-legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 4px; vertical-align: middle; }

  /* Settings panel */
  .panel { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 28px; }
  .panel.open { display: block; }
  .panel h2 { font-size: 14px; font-weight: 500; margin-bottom: 16px; font-family: 'DM Mono', monospace; }
  .field { margin-bottom: 14px; }
  .field label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px; }
  .field input { width: 100%; font-size: 13px; font-family: 'DM Mono', monospace; border: 1px solid var(--border); border-radius: 7px; padding: 8px 10px; background: var(--bg); color: var(--text); }
  .field input:focus { outline: none; border-color: var(--text); background: var(--surface); }
  .save-btn { font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; border: none; border-radius: 7px; padding: 9px 20px; background: var(--text); color: var(--surface); cursor: pointer; }
  .save-btn:hover { opacity: 0.85; }
  .panel-note { font-size: 12px; color: var(--muted); margin-top: 14px; line-height: 1.6; }
  .panel-note code { font-family: 'DM Mono', monospace; background: var(--bg); padding: 1px 5px; border-radius: 3px; font-size: 11px; }

  .toggle-past { font-size: 12px; color: var(--muted); background: none; border: none; cursor: pointer; font-family: inherit; text-decoration: underline; }

  #content-area { display: none; }
  #content-area.visible { display: block; }

  @media (max-width: 500px) {
    header { padding: 14px 16px; }
    main { padding: 20px 14px; }
    .booking { grid-template-columns: auto 1fr; }
    .booking-right { grid-column: 2; flex-direction: row; align-items: center; flex-wrap: wrap; }
  }
</style>
</head>

let lang = localStorage.getItem('lang') || 'en';
let dark = localStorage.getItem('dark') === '1';

function applyDark() {
  document.documentElement.classList.toggle('dark', dark);
  document.getElementById('dark-btn').textContent = dark ? '☾' : '☀';
}
function toggleDark() {
  dark = !dark;
  localStorage.setItem('dark', dark ? '1' : '0');
  applyDark();
}
applyDark();
let showPast = false;
let allBookings = [], pastBookings = [];
let isSyncing = false;
let firstLoadDone = false;

function t(key, arg) {
  const fn = T[lang][key];
  return typeof fn === 'function' ? fn(arg) : (fn || key);
}

// ── Sync state UI ─────────────────────────────────────────────────────────
function setSyncState(state) {
  // state: 'idle' | 'syncing' | 'done'
  const dot = document.getElementById('sync-dot');
  const bar = document.getElementById('progress-bar');
  const btn = document.getElementById('sync-btn');
  const icon = document.getElementById('sync-icon');
  const lbl = document.getElementById('sync-label');

  if (state === 'syncing') {
    dot.className = 'sync-dot active';
    bar.className = 'progress-bar active';
    btn.disabled = true;
    icon.className = 'spin';
    icon.textContent = '↻';
    lbl.textContent = t('syncing');
    isSyncing = true;
  } else if (state === 'done') {
    dot.className = 'sync-dot ok';
    bar.className = 'progress-bar';
    btn.disabled = false;
    icon.className = '';
    icon.textContent = '↻';
    lbl.textContent = t('syncLabel');
    isSyncing = false;
    // Fade dot back to neutral after 4s
    setTimeout(() => { if (dot.className === 'sync-dot ok') dot.className = 'sync-dot'; }, 4000);
  } else {
    dot.className = 'sync-dot';
    bar.className = 'progress-bar';
    btn.disabled = false;
    icon.className = '';
    icon.textContent = '↻';
    lbl.textContent = t('syncLabel');
    isSyncing = false;
  }
}

// ── i18n apply ────────────────────────────────────────────────────────────
function setLang(l) {
  lang = l;
  localStorage.setItem('lang', l);
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.getElementById('btn-bg').classList.toggle('active', l === 'bg');
  document.getElementById('h-title').textContent = t('title');
  document.getElementById('s-title').textContent = t('settingsTitle');
  document.getElementById('s-airbnb-label').textContent = t('airbnbLabel');
  document.getElementById('s-booking-label').textContent = t('bookingLabel');
  document.getElementById('s-save').textContent = t('saveBtn');
  document.getElementById('lbl-upcoming').textContent = t('upcoming');
  document.getElementById('lbl-past').textContent = t('past');
  document.getElementById('sync-label').textContent = isSyncing ? t('syncing') : t('syncLabel');
  if (firstLoadDone) renderAll();
  applyCal();
}

// ── Date helpers ──────────────────────────────────────────────────────────
const BG_MONTHS = ['яну','фев','мар','апр','май','юни','юли','авг','сеп','окт','ное','дек'];
function formatDate(d) {
  const dt = new Date(d + 'T00:00:00');
  const day = dt.getDate();
  const month = dt.getMonth();
  if (lang === 'bg') {
    return day + ' ' + BG_MONTHS[month];
  }
  return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}
function daysUntil(checkin) {
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.round((new Date(checkin + 'T00:00:00') - today) / 86400000);
}
function countdownHtml(b, past) {
  if (past) return `<span class="countdown cnt-past">${t('daysAgo', Math.abs(daysUntil(b.checkin)))}</span>`;
  const d = daysUntil(b.checkin);
  if (d === 0) return `<span class="countdown cnt-today">${t('checkinToday')}</span>`;
  if (d <= 3)  return `<span class="countdown cnt-soon">${t('inDays', d)}</span>`;
  return `<span class="countdown cnt-ok">${t('inDays', d)}</span>`;
}
function bookingLink(b) {
  if (b.platform === 'airbnb' && b.res_id)
    return `https://www.airbnb.com/hosting/reservations/details/${b.res_id}`;
  if (b.platform === 'booking' && b.res_id && b.hotel_id)
    return `https://admin.booking.com/hotel/hoteladmin/extranet_ng/manage/booking.html?res_id=${b.res_id}&hotel_id=${b.hotel_id}&lang=en-gb&from_confirmation_email=1`;
  return null;
}

function bookingHtml(b, past) {
  const tagClass = b.platform === 'airbnb' ? 'tag-airbnb' : 'tag-booking';
  const tagLabel = b.platform === 'airbnb' ? 'AB' : 'BK';
  const nameHtml = b.guest_name
    ? `<div class="booking-name">${b.guest_name}</div>`
    : `<div class="booking-name unknown">${t('noDetails')}</div>`;
  const link = bookingLink(b);
  const chips = [
    `<span class="chip">${t('nights', b.nights || 0)}</span>`,
    b.guest_count ? `<span class="chip">${t('guests', b.guest_count)}</span>` : '',
    !b.scraped_at && !past ? `<span class="chip chip-noscraped">${t('noScrape')}</span>` : '',
  ].filter(Boolean).join('');

  return `
  <div class="booking" id="bk-${b.id}">
    <div class="platform-tag ${tagClass}">${platformIcon(b.platform)}</div>
    <div class="booking-body">
      ${nameHtml}
      <div class="booking-dates">${formatDate(b.checkin)} → ${formatDate(b.checkout)}</div>
      <div class="booking-chips">${chips}</div>
    </div>
    <div class="booking-right">
      ${countdownHtml(b, past)}
      ${link ? `<a class="booking-link" href="${link}" target="_blank">${t('openLink')}</a>` : ''}

    </div>
  </div>`;
}

function renderAll() {
  const totalNights = allBookings.reduce((s, b) => s + (b.nights || 0), 0);
  const airbnbN = allBookings.filter(b => b.platform === 'airbnb').length;
  const bookingN = allBookings.filter(b => b.platform === 'booking').length;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat"><div class="stat-n">${allBookings.length}</div><div class="stat-l">${t('upcoming')}</div></div>
    <div class="stat"><div class="stat-n">${totalNights}</div><div class="stat-l">${lang==='bg'?'нощи':'nights'}</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--airbnb)">${airbnbN}</div><div class="stat-l">Airbnb</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--booking)">${bookingN}</div><div class="stat-l">Booking.com</div></div>
  `;

  document.getElementById('bookings-list').innerHTML = allBookings.length
    ? `<div class="booking-list">${allBookings.map(b => bookingHtml(b, false)).join('')}</div>`
    : `<div class="empty">${t('noUpcoming')}</div>`;

  document.getElementById('toggle-past-btn').textContent = showPast ? t('hidePast') : t('showPast');
  if (showPast) {
    document.getElementById('past-list').innerHTML = pastBookings.length
      ? `<div class="booking-list">${pastBookings.map(b => bookingHtml(b, true)).join('')}</div>`
      : `<div class="empty">${t('noPast')}</div>`;
  } else {
    document.getElementById('past-list').innerHTML = '';
  }
}

// ── Data loading ──────────────────────────────────────────────────────────
async function fetchBookings() {
  const [up, past] = await Promise.all([
    fetch(`${API}/api/bookings`).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); }),
    fetch(`${API}/api/bookings/past`).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); }),
  ]);
  allBookings = up;
  pastBookings = past;
}

async function loadBookingsWithRetry(retryDelay = 3000) {
  try {
    await fetchBookings();
    // First successful load: hide loader, show content
    if (!firstLoadDone) {
      document.getElementById('loader').className = 'loader-wrap hidden';
      document.getElementById('content-area').className = 'visible';
      firstLoadDone = true;
    }
    renderAll();
    if (showCal) renderCal();
  } catch (e) {
    console.warn('[bookings] fetch error, retrying in', retryDelay, 'ms —', e.message);
    document.getElementById('loader').textContent = t('connecting');
    setTimeout(() => loadBookingsWithRetry(retryDelay), retryDelay);
  }
}

async function loadSettings() {
  try {
    const s = await fetch(`${API}/api/settings`).then(r => r.json());
    if (s.airbnb_ical) document.getElementById('s-airbnb').value = s.airbnb_ical;
    if (s.booking_ical) document.getElementById('s-booking').value = s.booking_ical;
    const ab = s.last_sync_airbnb ? new Date(s.last_sync_airbnb).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '—';
    const bk = s.last_sync_booking ? new Date(s.last_sync_booking).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '—';
    document.getElementById('h-synced').textContent = `AB ${ab} · BK ${bk}`;
  } catch(e) { /* silently ignore */ }
}

async function runSync() {
  if (isSyncing) return;
  setSyncState('syncing');
  try {
    await fetch(`${API}/api/sync`, { method: 'POST' });
    await fetchBookings();
    if (firstLoadDone) renderAll();
    await loadSettings();
    setSyncState('done');
  } catch(e) {
    console.warn('[sync] failed:', e.message);
    setSyncState('idle');
  }
}

async function doSync() {
  await runSync();
}

async function saveSettings() {
  const ab = document.getElementById('s-airbnb').value.trim();
  const bk = document.getElementById('s-booking').value.trim();
  await fetch(`${API}/api/settings`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ airbnb_ical: ab, booking_ical: bk })
  });
  await runSync();
}


function toggleSettings() {
  document.getElementById('settings-panel').classList.toggle('open');
}
function togglePast() {
  showPast = !showPast;
  renderAll();
}


// ── Calendar ──────────────────────────────────────────────────────────────
let showCal = localStorage.getItem('showCal') === '1';
// calBase: the first of the left-hand month currently shown
let calBase = new Date();
calBase.setDate(1);

function toggleCal() {
  showCal = !showCal;
  localStorage.setItem('showCal', showCal ? '1' : '0');
  applyCal();
}

function applyCal() {
  const wrap = document.getElementById('cal-wrap');
  const btn  = document.getElementById('cal-toggle-btn');
  if (!wrap || !btn) return;
  wrap.style.display = showCal ? 'block' : 'none';
  btn.classList.toggle('active', showCal);
  btn.textContent = t(showCal ? 'hideCal' : 'showCal');
  if (showCal) renderCal();
}

function renderCal() {
  const wrap = document.getElementById('cal-wrap');
  if (!wrap) return;

  // Build a date->bookings lookup
  const dateMap = {}; // 'YYYY-MM-DD' -> [{platform, name}]
  const allB = [...allBookings, ...pastBookings];
  for (const b of allB) {
    if (b.status === 'cancelled') continue;
    let d = new Date(b.checkin + 'T00:00:00');
    const end = new Date(b.checkout + 'T00:00:00');
    while (d < end) {
      const key = d.toISOString().slice(0, 10);
      if (!dateMap[key]) dateMap[key] = [];
      dateMap[key].push(b);
      d.setDate(d.getDate() + 1);
    }
  }

  const months = t('calMonths');
  const dows   = t('calDows');
  const today  = new Date(); today.setHours(0,0,0,0);

  // Render two months: calBase and calBase+1
  let html = '<div class="cal-months">';
  for (let m = 0; m < 2; m++) {
    const base = new Date(calBase.getFullYear(), calBase.getMonth() + m, 1);
    const year = base.getFullYear();
    const mon  = base.getMonth();
    const daysInMonth = new Date(year, mon + 1, 0).getDate();
    // Monday-first: getDay() 0=Sun → shift
    let startDow = base.getDay(); // 0=Sun
    startDow = startDow === 0 ? 6 : startDow - 1; // Mon=0

    // Year/month jump selectors
    let yearOpts = '';
    for (let y = today.getFullYear() - 1; y <= today.getFullYear() + 3; y++) {
      yearOpts += `<option value="${y}" ${y===year?'selected':''}>${y}</option>`;
    }
    let monOpts = '';
    months.forEach((mn, i) => {
      monOpts += `<option value="${i}" ${i===mon?'selected':''}>${mn}</option>`;
    });

    // Navigation only on left month header
    const navHtml = m === 0 ? `
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="calShift(-1)">‹</button>
        <div class="cal-jump">
          <select onchange="calJump(parseInt(this.value), ${mon})">${yearOpts}</select>
          <select onchange="calJump(${year}, parseInt(this.value))">${monOpts}</select>
        </div>
        <button class="cal-nav-btn" onclick="calShift(1)">›</button>
      </div>` : '';

    // Day-of-week headers
    let gridHtml = dows.map(d => `<div class="cal-dow">${d}</div>`).join('');

    // Empty cells before first day
    for (let i = 0; i < startDow; i++) gridHtml += '<div class="cal-cell other-month"></div>';

    // Day cells
    for (let day = 1; day <= daysInMonth; day++) {
      const dateStr = `${year}-${String(mon+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const dt = new Date(dateStr + 'T00:00:00');
      const isToday = dt.getTime() === today.getTime();
      const bs = dateMap[dateStr] || [];
      const hasAB = bs.some(b => b.platform === 'airbnb');
      const hasBK = bs.some(b => b.platform === 'booking');
      let cls = 'cal-cell this-month';
      if (isToday) cls += ' today';
      if (hasAB && hasBK) cls += ' booked-both';
      else if (hasAB) cls += ' booked-airbnb';
      else if (hasBK) cls += ' booked-booking';

      // Show first booking's guest name initial or checkin marker
      let eventsHtml = '';
      for (const b of bs.slice(0,1)) {
        const isCi = dateStr === b.checkin;
        const label = isCi ? (b.guest_name ? b.guest_name.split(' ')[0] : '●') : '·';
        const cls2 = b.platform === 'airbnb' ? 'ab' : 'bk';
        eventsHtml += `<div class="cal-event ${cls2}">${label}</div>`;
      }

      gridHtml += `<div class="${cls}"><div class="cal-day-num">${day}</div>${eventsHtml}</div>`;
    }

    html += `
    <div class="cal-month">
      <div class="cal-month-head">
        <span class="cal-month-title">${months[mon]} ${year}</span>
        ${navHtml}
      </div>
      <div class="cal-grid">${gridHtml}</div>
    </div>`;
  }

  html += `</div>
  <div class="cal-legend">
    <span><span class="cal-legend-dot" style="background:var(--airbnb-bg);border:1px solid var(--airbnb);opacity:0.8"></span>Airbnb</span>
    <span><span class="cal-legend-dot" style="background:var(--booking-bg);border:1px solid var(--booking);opacity:0.8"></span>Booking.com</span>
  </div>`;

  wrap.innerHTML = html;
}

function calShift(delta) {
  calBase = new Date(calBase.getFullYear(), calBase.getMonth() + delta, 1);
  renderCal();
}

function calJump(year, mon) {
  calBase = new Date(year, mon, 1);
  renderCal();
}

// ── Init ──────────────────────────────────────────────────────────────────
setLang(lang);
applyCal();

// 1. Load whatever is in the DB right now (fast — no iCal fetch)
loadBookingsWithRetry();

// 2. Load settings (iCal URLs + last sync times)
loadSettings();

// 3. Trigger a background iCal sync — updates DB then re-renders
runSync();

// 4. Auto-refresh every 5 min
setInterval(() => { loadBookingsWithRetry(); loadSettings(); }, 5 * 60 * 1000);
</script>
